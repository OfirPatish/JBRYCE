<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Drawing</title>
    <!-- Bootstrap and Custom CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Bootstrap and Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <!-- Form section -->
        <div class="col-lg-6">
          <div class="form-section mt-3">
            <!-- Form to calculate area -->
            <form id="areaForm">
              <!-- Input fields for edges and coordinates -->
              <div class="mb-3">
                <label for="edgeA" class="form-label">Edge A</label>
                <input
                  type="number"
                  class="form-control w-50"
                  id="edgeA"
                  placeholder="Length of the first edge"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="edgeB" class="form-label">Edge B</label>
                <input
                  type="number"
                  class="form-control w-50"
                  id="edgeB"
                  placeholder="Length of the second edge"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="coordX" class="form-label">X Coordinate</label>
                <input
                  type="number"
                  class="form-control w-50"
                  id="coordX"
                  placeholder="Position of the X coordinate"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="coordY" class="form-label">Y Coordinate</label>
                <input
                  type="number"
                  class="form-control w-50"
                  id="coordY"
                  placeholder="Position of the Y coordinate"
                  required
                />
              </div>
              <!-- Display area -->
              <div class="mb-1">
                <label id="squareArea" class="form-label">Square Area: </label>
              </div>
              <!-- Submit button -->
              <button type="submit" class="btn btn-primary">Calculate</button>
            </form>
          </div>
        </div>
        <!-- Canvas section -->
        <div class="col-lg-6 canvas-right">
          <div class="canvas-section mt-3">
            <h2>Drawing On Canvas!</h2>
            <!-- Canvas element -->
            <canvas id="myCanvas" width="500" height="500" style="border: 1px solid #d3d3d3"> </canvas>
            <!-- Button to clear canvas -->
            <button type="button" class="btn btn-secondary clear-canvas-btn" onclick="clearCanvas()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
