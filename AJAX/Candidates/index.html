    <title>Candidates</title>

    <script src="js/main.js" defer></script>

    <style>
      body {
        text-align: center;
      }
      #res {

        width: 85%;
        border-collapse: collapse;
      }

      #res th,

        border: 1px solid #ddd;
        padding: 8px;
      }

      #res tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      #res th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #4caf50;
        color: white;
      }
    </style>
  </head>
  <body>
    <input type="button" id="candidateBtn" value="Show" />
    <hr />
    <table id="res">
      <thead>
        <tr>
          <th>City</th>
          <th>District</th>
          <th>SumCandidates</th>
          <th>Candidates</th>
        </tr>
      </thead>
      <tbody>
        <!-- Table data goes here -->
